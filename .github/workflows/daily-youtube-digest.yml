name: Daily YouTube Digest

on:
  schedule:
    - cron: "0 23 * * *" # KST 08:00
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./유튜브 주제별 정리

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: |
          missing=()
          for name in \
            YOUTUBE_CLIENT_ID \
            YOUTUBE_CLIENT_SECRET \
            YOUTUBE_REFRESH_TOKEN \
            GOOGLE_SPREADSHEET_ID
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
            exit 1
          fi

      - name: Run digest
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALLOW_RULE_BASED_CLASSIFIER: ${{ vars.ALLOW_RULE_BASED_CLASSIFIER || 'true' }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_SHEET_NAME: ${{ vars.GOOGLE_SHEET_NAME || '__RUN_TIMESTAMP__' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_REFRESH_TOKEN: ${{ secrets.GOOGLE_SHEETS_REFRESH_TOKEN }}
        run: python -m src.main
